<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>LinkedIn Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #07070d;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff2bd6;
            --neon-purple: #9b5cff;
            --text: #e6e6f0;
            --text-dim: #8a8aa0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; }
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            font-family: 'JetBrains Mono', monospace;
        }

        .banner {
            position: relative;
            width: 1584px;
            height: 396px;
            overflow: hidden;
            background:
                radial-gradient(ellipse 60% 80% at 12% 0%, rgba(0, 240, 255, 0.18), transparent 60%),
                radial-gradient(ellipse 60% 80% at 88% 100%, rgba(255, 43, 214, 0.18), transparent 60%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(155, 92, 255, 0.06), transparent 70%),
                linear-gradient(180deg, #0a0a14 0%, #07070d 100%);
            color: #fff;
        }

        /* Grid */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.06) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(ellipse 80% 90% at center, black 30%, transparent 75%);
            opacity: 0.85;
        }

        /* Glow blobs */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        .glow.g1 { width: 380px; height: 380px; top: -120px; left: -80px;  background: radial-gradient(circle, rgba(0, 240, 255, 0.55), transparent 70%); }
        .glow.g2 { width: 460px; height: 460px; bottom: -180px; right: -120px; background: radial-gradient(circle, rgba(255, 43, 214, 0.5), transparent 70%); }
        .glow.g3 { width: 280px; height: 280px; top: 20%; right: 30%; background: radial-gradient(circle, rgba(155, 92, 255, 0.35), transparent 70%); }

        /* Scanlines */
        .scan {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.018) 0px,
                rgba(255, 255, 255, 0.018) 1px,
                transparent 1px,
                transparent 3px
            );
            mix-blend-mode: overlay;
            opacity: 0.7;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 380px;
            align-items: center;
            padding: 0 80px;
            gap: 50px;
        }

        .left .tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 240, 255, 0.35);
            border-radius: 999px;
            background: rgba(0, 240, 255, 0.06);
            color: #d6f7ff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: lowercase;
            margin-bottom: 22px;
        }

        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #29d97e;
            box-shadow: 0 0 10px rgba(41, 217, 126, 0.8);
        }

        .name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 110px;
            letter-spacing: 2px;
            line-height: 0.95;
            color: #fff;
            text-shadow:
                0 0 18px rgba(0, 240, 255, 0.4),
                0 0 36px rgba(155, 92, 255, 0.35),
                0 0 70px rgba(255, 43, 214, 0.2);
            display: inline-block;
        }

        .name .accent {
            background: linear-gradient(135deg, #00f0ff 0%, #ff2bd6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .role {
            margin-top: 22px;
            display: flex;
            align-items: center;
            gap: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            letter-spacing: 2px;
            color: #c8c8d8;
        }

        .role .line {
            width: 64px;
            height: 1.5px;
            background: linear-gradient(90deg, #00f0ff, transparent);
            box-shadow: 0 0 6px #00f0ff;
        }

        .role .pipe { color: rgba(255, 43, 214, 0.7); }
        .role .pink { color: #ff7ee0; }
        .role .cyan { color: #6ff5ff; }

        /* Right column — terminal-style code card */
        .term {
            width: 100%;
            height: 220px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(20, 12, 36, 0.7), rgba(12, 12, 24, 0.7));
            box-shadow:
                0 30px 60px -20px rgba(0, 240, 255, 0.35),
                0 10px 30px -8px rgba(255, 43, 214, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
        }

        .term::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            opacity: 0.7;
        }

        .term-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .term-dot {
            width: 11px; height: 11px;
            border-radius: 50%;
        }
        .term-dot.r { background: #ff5f57; }
        .term-dot.y { background: #febc2e; }
        .term-dot.g { background: #28c840; }
        .term-title {
            margin-left: 10px;
            color: #aaa;
            font-size: 12px;
        }

        .term-body {
            padding: 16px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.7;
            color: #b8b8c8;
        }
        .term-body .pr { color: var(--neon-pink); }
        .term-body .kw { color: var(--neon-cyan); }
        .term-body .st { color: #9b5cff; }
        .term-body .nu { color: #ffb86b; }
        .term-body .cm { color: #5c5c70; }
        .term-body .caret {
            display: inline-block;
            width: 9px;
            height: 16px;
            background: #00f0ff;
            vertical-align: -3px;
            margin-left: 2px;
            box-shadow: 0 0 6px #00f0ff;
        }

        /* Floating handle bottom-right */
        .handle {
            position: absolute;
            bottom: 24px;
            right: 32px;
            z-index: 3;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        .handle b { color: #fff; }

        /* Logo top-left */
        .logo {
            position: absolute;
            top: 28px;
            left: 32px;
            z-index: 3;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }
        .logo .slash { color: var(--neon-pink); }
    </style>
</head>
<body>
    <div class="banner" id="banner">
        <div class="grid"></div>
        <div class="glow g1"></div>
        <div class="glow g2"></div>
        <div class="glow g3"></div>
        <div class="scan"></div>

        <div class="logo">&lt;Sevastiian<span class="slash">/</span>&gt;</div>

        <div class="content">
            <div class="left">
                <div class="tag">
                    <span class="dot"></span>
                    <span>available · odesa / remote</span>
                </div>
                <div class="name">Sevastii<span class="accent">an</span></div>
                <div class="role">
                    <span class="line"></span>
                    <span class="cyan">.NET</span>
                    <span class="pipe">/</span>
                    <span>React</span>
                    <span class="pipe">·</span>
                    <span class="pink">Distributed Systems</span>
                </div>
            </div>

            <div class="term">
                <div class="term-head">
                    <span class="term-dot r"></span>
                    <span class="term-dot y"></span>
                    <span class="term-dot g"></span>
                    <span class="term-title">~ / sevastiian.os</span>
                </div>
                <div class="term-body">
                    <div><span class="cm">// stack</span></div>
                    <div><span class="pr">&gt;</span> <span class="kw">dotnet</span> <span class="st">"orleans"</span> <span class="st">"aspire"</span></div>
                    <div><span class="pr">&gt;</span> <span class="kw">react</span> <span class="nu">19</span> <span class="st">"vite"</span> <span class="st">"signalr"</span></div>
                    <div><span class="pr">&gt;</span> <span class="kw">deploy</span> <span class="st">"k8s"</span> <span class="st">"fly.io"</span><span class="caret"></span></div>
                </div>
            </div>
        </div>

        <div class="handle"><b>n1mfaq.github.io/me</b> · @cwiwi9</div>
    </div>
</body>
</html>
