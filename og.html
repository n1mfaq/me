<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>OG Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff2bd6;
            --neon-purple: #9b5cff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'JetBrains Mono', monospace; }

        .og {
            position: absolute;
            top: 0; left: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background:
                radial-gradient(ellipse 60% 80% at 12% 0%, rgba(0, 240, 255, 0.22), transparent 60%),
                radial-gradient(ellipse 60% 80% at 88% 100%, rgba(255, 43, 214, 0.22), transparent 60%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(155, 92, 255, 0.08), transparent 70%),
                linear-gradient(180deg, #0a0a14 0%, #07070d 100%);
            color: #fff;
            isolation: isolate;
        }

        .grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.07) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 90% at center, black 30%, transparent 75%);
            opacity: 0.85;
        }

        .glow { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; }
        .glow.g1 { width: 460px; height: 460px; top: -160px; left: -100px;  background: radial-gradient(circle, rgba(0, 240, 255, 0.6), transparent 70%); }
        .glow.g2 { width: 540px; height: 540px; bottom: -240px; right: -160px; background: radial-gradient(circle, rgba(255, 43, 214, 0.55), transparent 70%); }

        .scan {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(to bottom,
                rgba(255, 255, 255, 0.02) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 1px,
                transparent 3px);
            mix-blend-mode: overlay;
            opacity: 0.7;
            pointer-events: none;
        }

        .logo {
            position: absolute;
            top: 36px;
            left: 60px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }
        .logo .slash { color: var(--neon-pink); }

        .url {
            position: absolute;
            top: 36px;
            right: 60px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            color: #8a8aa0;
        }
        .url b { color: #fff; }

        .content {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0;
            padding: 0 60px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 999px;
            background: rgba(0, 240, 255, 0.07);
            color: #d6f7ff;
            font-size: 14px;
            letter-spacing: 2.5px;
            text-transform: lowercase;
            margin-bottom: 30px;
        }

        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #29d97e;
            box-shadow: 0 0 10px rgba(41, 217, 126, 0.85);
        }

        .name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 132px;
            letter-spacing: 3px;
            line-height: 0.95;
            color: #fff;
            text-shadow:
                0 0 22px rgba(0, 240, 255, 0.45),
                0 0 44px rgba(155, 92, 255, 0.4),
                0 0 80px rgba(255, 43, 214, 0.25);
            white-space: nowrap;
            margin-bottom: 8px;
        }

        .name .accent {
            background: linear-gradient(135deg, #00f0ff 0%, #ff2bd6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .role {
            margin-top: 28px;
            display: flex;
            align-items: center;
            gap: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            letter-spacing: 2.5px;
            color: #c8c8d8;
            white-space: nowrap;
        }

        .role .line {
            width: 60px;
            height: 1.5px;
            background: linear-gradient(90deg, #00f0ff, transparent);
            box-shadow: 0 0 6px #00f0ff;
        }
        .role .line.right {
            background: linear-gradient(90deg, transparent, #ff2bd6);
            box-shadow: 0 0 6px #ff2bd6;
        }

        .role .pipe { color: rgba(255, 43, 214, 0.7); }
        .role .pink { color: #ff7ee0; }
        .role .cyan { color: #6ff5ff; }

        .stack {
            margin-top: 50px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chip {
            padding: 8px 16px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            color: #d6d6e6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            background: rgba(12, 12, 24, 0.6);
            backdrop-filter: blur(6px);
            letter-spacing: 1px;
        }
        .chip.cyan { border-color: rgba(0, 240, 255, 0.4); color: #6ff5ff; }
        .chip.pink { border-color: rgba(255, 43, 214, 0.4); color: #ff7ee0; }
        .chip.purple { border-color: rgba(155, 92, 255, 0.4); color: #c4a3ff; }
    </style>
</head>
<body>
    <div class="og" id="og">
        <div class="grid"></div>
        <div class="glow g1"></div>
        <div class="glow g2"></div>
        <div class="scan"></div>

        <div class="logo">&lt;Sevastiian<span class="slash">/</span>&gt;</div>
        <div class="url"><b>n1mfaq.github.io/me</b></div>

        <div class="content">
            <div class="tag">
                <span class="dot"></span>
                <span>full-stack engineer · odesa / remote</span>
            </div>

            <div class="name">Sevastii<span class="accent">an</span></div>

            <div class="role">
                <span class="line"></span>
                <span class="cyan">.NET</span>
                <span class="pipe">/</span>
                <span>React</span>
                <span class="pipe">·</span>
                <span class="pink">Distributed Systems</span>
                <span class="line right"></span>
            </div>

            <div class="stack">
                <span class="chip cyan">C# · .NET 9</span>
                <span class="chip purple">Microsoft Orleans</span>
                <span class="chip purple">.NET Aspire</span>
                <span class="chip cyan">React 19</span>
                <span class="chip pink">PostgreSQL</span>
                <span class="chip pink">Redis</span>
                <span class="chip">OpenAI · MCP</span>
            </div>
        </div>
    </div>
</body>
</html>
